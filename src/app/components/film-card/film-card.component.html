<div class="card" (click)="goToDetails()">
  <img [src]="film().posterUrl" [alt]="film().title" />

  <div class="card-body">
    <div class="title">{{ film().title }}</div>
    <div class="meta">{{ film().year }} • {{ film().genre }}</div>

    <button
      class="favorite"
      (click)="onFavoriteClick(); $event.stopPropagation()"
    >
      @if (film().isFavorite) { ❤️ } @else { 🤍 }
    </button>
  </div>
</div>
